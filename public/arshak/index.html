<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <title>Gonian Arshak | UAB TERSIS</title>
    <!-- ЗАМЕНЕНО НА ЗЕРКАЛО ДЛЯ РФ -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #0052ff; --bg: #030712; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: white; margin: 0; padding: 0; min-height: 100vh; -webkit-font-smoothing: antialiased; }
        
        .bg-layer { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
        .grid-pattern {
            position: absolute; inset: 0;
            background-image: 
                linear-gradient(rgba(0, 82, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 82, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            mask-image: radial-gradient(circle at 50% 30%, black 20%, transparent 85%);
            -webkit-mask-image: radial-gradient(circle at 50% 30%, black 20%, transparent 85%);
        }
        .glow {
            position: absolute; top: 0%; left: 50%; transform: translateX(-50%);
            width: 100%; height: 60%;
            background: radial-gradient(circle at 50% 0%, rgba(0, 82, 255, 0.18) 0%, transparent 70%);
        }

        .glass-card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
            transition: all 0.2s ease-out;
        }
        .glass-card:active { transform: scale(0.97); background: rgba(255, 255, 255, 0.07); border-color: var(--accent); }

        .btn-glow { box-shadow: 0 0 30px rgba(0, 82, 255, 0.4); }
        * { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="relative flex flex-col items-center py-12 px-6">
    
    <div class="bg-layer pointer-events-none">
        <div class="grid-pattern"></div>
        <div class="glow"></div>
    </div>

    <div class="w-full max-w-[380px] relative z-10">
        
        <!-- Profile Section -->
        <div class="text-center mb-8">
            <div class="inline-block relative mb-8">
                <!-- LOGO BOX (ПУТЬ ИСПРАВЛЕН) -->
                <div class="w-24 h-24 rounded-3xl bg-[#050a14] border border-white/10 flex items-center justify-center p-5 shadow-[0_0_50px_rgba(0,82,255,0.2)]">
                    <img src="https://tersis.lt/logo.png" alt="TERSIS" class="w-full h-full object-contain">
                </div>
            </div>
            
            <!-- NAME WITH FIXED GAP FOR MOBILE -->
            <h1 class="text-[42px] font-[900] uppercase tracking-tighter leading-none mb-4 flex justify-center italic">
                <span>GONIAN</span>
                <span class="inline-block" style="width: 15px;"></span>
                <span>ARSHAK</span>
            </h1>

            <p class="text-[#0052ff] text-[11px] font-black uppercase tracking-[0.25em] mb-2">FOUNDER</p>
            <p class="text-white text-[16px] font-[900] uppercase tracking-[0.5em] leading-none">UAB TERSIS</p>
        </div>

        <!-- Ключевые факты (УТП) -->
        <div class="grid grid-cols-3 gap-2 mb-8">
            <div class="glass-card rounded-2xl py-4 px-1 text-center border-white/10">
                <svg class="w-6 h-6 mx-auto mb-2 text-[#0052ff]" fill="currentColor" viewBox="0 0 24 24"><path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4zM6 18.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm12 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
                <p class="text-[12px] font-[900] text-white uppercase leading-none mb-1">27+ OWN</p>
                <p class="text-[8px] font-bold text-gray-500 uppercase tracking-widest">Fleet</p>
            </div>
            <div class="glass-card rounded-2xl py-4 px-1 text-center border-white/10">
                <svg class="w-6 h-6 mx-auto mb-2 text-[#0052ff]" fill="currentColor" viewBox="0 0 24 24"><path d="M21 16.5c0 .38-.21.71-.53.88l-7.9 4.44c-.16.12-.36.18-.57.18s-.41-.06-.57-.18l-7.9-4.44A.99.99 0 013 16.5v-9c0-.38.21-.71.53-.88l7.9-4.44c.16-.12.36-.18.57-.18s.41.06.57.18l7.9 4.44c.32.17.53.5.53.88v9z"/></svg>
                <p class="text-[12px] font-[900] text-white uppercase leading-none mb-1">105 m³</p>
                <p class="text-[8px] font-bold text-gray-500 uppercase tracking-widest">Mega</p>
            </div>
            <div class="glass-card rounded-2xl py-4 px-1 text-center border-white/10">
                <svg class="w-6 h-6 mx-auto mb-2 text-[#0052ff]" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
                <p class="text-[12px] font-[900] text-white uppercase leading-none mb-1">DIRECT</p>
                <p class="text-[8px] font-bold text-gray-500 uppercase tracking-widest">Impact</p>
            </div>
        </div>

        <!-- Кнопка Save Contact -->
        <button onclick="downloadVCard()" class="btn-glow w-full bg-[#0052ff] text-white py-5 rounded-2xl font-black uppercase tracking-[0.15em] text-sm hover:bg-[#003dd6] transition mb-14 active:scale-95">
            Save Contact
        </button>

        <!-- Links List -->
        <div class="space-y-4">
            <p class="text-[10px] font-black text-gray-500 uppercase tracking-[0.4em] text-center mb-2">Business Channels</p>
            
            <a href="https://t.me/A12345Sbo" class="glass-card p-5 rounded-2xl flex items-center group transition-all">
                <span class="font-bold uppercase text-[12px] tracking-[0.2em] flex-1 text-center">Telegram</span>
            </a>

            <a href="https://wa.me/37477102474" class="glass-card p-5 rounded-2xl flex items-center group transition-all">
                <span class="font-bold uppercase text-[12px] tracking-[0.2em] flex-1 text-center">WhatsApp</span>
            </a>

            <a href="https://tersis.lt" class="glass-card p-5 rounded-2xl flex items-center group transition-all">
                <span class="font-bold uppercase text-[12px] tracking-[0.2em] flex-1 text-center">Official Website</span>
            </a>

            <a href="tel:+37477102474" class="glass-card p-5 rounded-2xl flex items-center group transition-all">
                <span class="font-bold uppercase text-[12px] tracking-[0.2em] flex-1 text-center">Call Arshak</span>
            </a>

            <a href="mailto:tersis@inbox.lt" class="glass-card p-5 rounded-2xl flex items-center group transition-all">
                <span class="font-bold uppercase text-[12px] tracking-[0.2em] flex-1 text-center">Email Founder</span>
            </a>
        </div>

        <!-- Footer -->
        <div class="mt-20 mb-10 text-center opacity-30">
            <p class="text-[8px] font-black uppercase tracking-[0.8em]">
                European Asset-Based Carrier
            </p>
        </div>
    </div>

    <script>
        function downloadVCard() {
            const vCard = `BEGIN:VCARD
VERSION:3.0
FN:Gonian Arshak
ORG:UAB TERSIS
TITLE:FOUNDER
TEL;TYPE=CELL:+37477102474
EMAIL:tersis@inbox.lt
URL:https://tersis.lt
END:VCARD`;
            const blob = new Blob([vCard], { type: 'text/vcard' });
            const url = window.URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.setAttribute('download', 'Gonian_Arshak.vcf');
            link.click();
        }
    </script>
</body>
</html>
