<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <!-- Зеркало Tailwind для стабильности в РФ -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #0052ff; --bg: #030712; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: white; margin: 0; padding: 0; min-height: 100vh; -webkit-font-smoothing: antialiased; }
        
        .bg-layer { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
        .grid-pattern {
            position: absolute; inset: 0;
            background-image: 
                linear-gradient(rgba(0, 82, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 82, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            mask-image: radial-gradient(circle at 50% 30%, black 20%, transparent 85%);
        }
        .glow {
            position: absolute; top: 0%; left: 50%; transform: translateX(-50%);
            width: 100%; height: 60%;
            background: radial-gradient(circle at 50% 0%, rgba(0, 82, 255, 0.18) 0%, transparent 70%);
        }

        .glass-card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
            transition: all 0.2s ease-out;
        }
        .glass-card:active { transform: scale(0.97); background: rgba(255, 255, 255, 0.07); border-color: var(--accent); }

        .btn-glow { box-shadow: 0 0 30px rgba(0, 82, 255, 0.4); }
        * { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
