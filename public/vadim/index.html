<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vadim Ivanov | UAB TERSIS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #0052ff; --bg: #030712; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: white; margin: 0; padding: 0; min-height: 100vh; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .reveal { opacity: 0; animation: fadeInUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
        
        .bg-layer { position: fixed; inset: 0; z-index: 0; }
        .grid-pattern {
            position: absolute; inset: 0;
            background-image: linear-gradient(rgba(0, 82, 255, 0.08) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 82, 255, 0.08) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: radial-gradient(circle at 50% 30%, black 20%, transparent 85%);
        }

        .glass-card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }
        
        #qrModal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.95); align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body class="flex flex-col items-center py-10 px-6">
    
    <div class="bg-layer pointer-events-none">
        <div class="grid-pattern"></div>
    </div>

    <div class="w-full max-w-[380px] relative z-10">
        
        <!-- Header -->
        <div class="text-center mb-10 reveal" style="animation-delay: 0.1s">
            <div class="inline-block mb-6">
                <div class="w-20 h-20 rounded-2xl bg-[#050a14] border border-white/10 flex items-center justify-center p-4">
                    <img src="https://tersis.lt/wp-content/uploads/2022/02/tersis-logo-white.png" alt="TERSIS" class="w-full h-auto">
                </div>
            </div>
            
            <h1 class="text-[42px] font-[900] uppercase tracking-tighter leading-none mb-3 italic">
                VADIM <span class="text-[#0052ff]">IVANOV</span>
            </h1>

            <p class="text-[#0052ff] text-[10px] font-black uppercase tracking-[0.2em] mb-2">Logistics & Business Development</p>
            <p class="text-white text-[16px] font-black uppercase tracking-[0.3em] not-italic">UAB TERSIS</p>
        </div>

        <!-- USP Plates (Твои плашки) -->
        <div class="grid grid-cols-3 gap-2 mb-10 reveal" style="animation-delay: 0.2s">
            <div class="glass-card rounded-xl p-3 text-center border-blue-500/20">
                <p class="text-[9px] font-bold text-blue-500 uppercase mb-1">Fleet</p>
                <p class="text-[12px] font-black italic">27+ OWN</p>
            </div>
            <div class="glass-card rounded-xl p-3 text-center border-blue-500/20">
                <p class="text-[9px] font-bold text-blue-500 uppercase mb-1">Volume</p>
                <p class="text-[12px] font-black italic">105 m³</p>
            </div>
            <div class="glass-card rounded-xl p-3 text-center border-blue-500/20">
                <p class="text-[9px] font-bold text-blue-500 uppercase mb-1">Impact</p>
                <p class="text-[12px] font-black italic">DIRECT</p>
            </div>
        </div>

        <!-- Оффлайн кнопка -->
        <button onclick="toggleQR()" class="reveal w-full bg-white text-black py-4 rounded-xl font-black uppercase tracking-widest text-[11px] mb-12 flex items-center justify-center gap-3 active:scale-95 transition-all shadow-[0_0_20px_rgba(255,255,255,0.1)]" style="animation-delay: 0.3s">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M3 11h8V3H3v8zm2-6h4v4H5V5zM3 21h8v-8H3v8zm2-6h4v4H5v-4zM13 3v8h8V3h-8zm6 6h-4V5h4v4zM13 13h2v2h-2v-2zm2 2h2v2h-2v-2zm2-2h2v2h-2v-2zm2 2h2v2h-2v-2zm-4 4h2v2h-2v-2zm2-2h2v2h-2v-2zm-4 4h2v2h-2v-2z"/></svg>
            Share Offline Contact
        </button>

        <!-- Links List -->
        <div class="space-y-3">
            <p class="text-[10px] font-black text-gray-500 uppercase tracking-[0.4em] text-center mb-6 reveal" style="animation-delay: 0.4s">Business Channels</p>
            
            <!-- Telegram -->
            <a href="https://t.me/bitrabbit" class="reveal glass-card p-4 rounded-2xl flex items-center" style="animation-delay: 0.5s">
                <div class="w-10 h-10 bg-blue-500/10 rounded-xl flex items-center justify-center mr-4 text-[#0052ff]">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1.01-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.27-.02-.12.02-1.96 1.25-5.54 3.69-.52.36-1 .53-1.42.52-.47-.01-1.37-.26-2.03-.48-.82-.27-1.47-.42-1.42-.88.03-.24.35-.49.96-.75 3.78-1.65 6.31-2.74 7.58-3.27 3.61-1.51 4.35-1.77 4.84-1.78.11 0 .35.03.5.16.12.11.16.26.18.37.01.07.01.21 0 .33z"/></svg>
                </div>
                <span class="font-bold uppercase text-[11px] tracking-widest flex-1">Telegram</span>
            </a>

            <!-- WhatsApp -->
            <a href="https://wa.me/79266207185" class="reveal glass-card p-4 rounded-2xl flex items-center" style="animation-delay: 0.6s">
                <div class="w-10 h-10 bg-green-500/10 rounded-xl flex items-center justify-center mr-4 text-green-500">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                </div>
                <span class="font-bold uppercase text-[11px] tracking-widest flex-1">WhatsApp</span>
            </a>

            <!-- Website -->
            <a href="https://tersis.lt" class="reveal glass-card p-4 rounded-2xl flex items-center" style="animation-delay: 0.7s">
                <div class="w-10 h-10 bg-white/5 rounded-xl flex items-center justify-center mr-4 text-white">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                </div>
                <span class="font-bold uppercase text-[11px] tracking-widest flex-1">Website</span>
            </a>

            <!-- Call -->
            <a href="tel:+79266207185" class="reveal glass-card p-4 rounded-2xl flex items-center" style="animation-delay: 0.8s">
                <div class="w-10 h-10 bg-white/5 rounded-xl flex items-center justify-center mr-4 text-gray-300">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                </div>
                <span class="font-bold uppercase text-[11px] tracking-widest flex-1">Call Vadim</span>
            </a>

            <!-- Email -->
            <a href="mailto:business@tersis.lt" class="reveal glass-card p-4 rounded-2xl flex items-center" style="animation-delay: 0.9s">
                <div class="w-10 h-10 bg-white/5 rounded-xl flex items-center justify-center mr-4 text-gray-400">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                </div>
                <span class="font-bold uppercase text-[11px] tracking-widest flex-1">Email Business</span>
            </a>
        </div>

        <div class="mt-16 text-center opacity-20 reveal" style="animation-delay: 1.1s">
            <p class="text-[8px] font-black uppercase tracking-[0.8em]">European Asset-Based Carrier</p>
        </div>
    </div>

    <!-- Модалка с VCard QR -->
    <div id="qrModal" onclick="toggleQR()">
        <div class="bg-white p-8 rounded-[40px] text-center shadow-2xl scale-up" onclick="event.stopPropagation()">
            <p class="text-black font-black uppercase text-[12px] tracking-widest mb-6">Scan to Save Contact</p>
            
            <!-- Этот QR содержит полную визитную карточку -->
            <img id="qrImage" src="" alt="VCard QR" class="w-64 h-64 mx-auto mb-6">
            
            <p class="text-gray-400 text-[10px] uppercase font-bold leading-tight">No internet required <br>for the recipient</p>
            <button onclick="toggleQR()" class="mt-8 bg-gray-100 text-black px-8 py-3 rounded-full font-bold text-[11px] uppercase tracking-wider">Close</button>
        </div>
    </div>

    <script>
        function toggleQR() {
            const modal = document.getElementById('qrModal');
            const qrImg = document.getElementById('qrImage');
            
            // Генерируем vCard строку
            const vCardData = `BEGIN:VCARD
VERSION:3.0
FN:Vadim Ivanov
ORG:UAB TERSIS
TITLE:Logistics & Business Development
TEL;TYPE=CELL:+79266207185
EMAIL:business@tersis.lt
URL:https://tersis.lt
END:VCARD`;

            // Кодируем vCard для использования в API генератора QR
            if (modal.style.display !== 'flex') {
                const encodedData = encodeURIComponent(vCardData);
                qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodedData}`;
                modal.style.display = 'flex';
            } else {
                modal.style.display = 'none';
            }
        }
    </script>
</body>
</html>
