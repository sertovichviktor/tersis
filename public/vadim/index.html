<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <title>Vadim Ivanov | UAB TERSIS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #0052ff; --bg: #030712; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: white; margin: 0; padding: 0; min-height: 100vh; -webkit-font-smoothing: antialiased; }
        
        .bg-layer { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
        .grid-pattern {
            position: absolute; inset: 0;
            background-image: 
                linear-gradient(rgba(0, 82, 255, 0.07) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 82, 255, 0.07) 1px, transparent 1px);
            background-size: 45px 45px;
            mask-image: radial-gradient(circle at 50% 25%, black 20%, transparent 90%);
        }
        .glow {
            position: absolute; top: -10%; left: 50%; transform: translateX(-50%);
            width: 120%; height: 50%;
            background: radial-gradient(circle at 50% 0%, rgba(0, 82, 255, 0.15) 0%, transparent 70%);
        }

        .glass-card { 
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.02) 100%);
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }

        .usp-card {
            border: 1px solid rgba(0, 82, 255, 0.2);
            background: rgba(0, 82, 255, 0.03);
        }

        .btn-glow { box-shadow: 0 10px 40px -10px rgba(0, 82, 255, 0.5); }
        * { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="relative flex flex-col items-center py-10 px-6">
    
    <div class="bg-layer pointer-events-none">
        <div class="grid-pattern"></div>
        <div class="glow"></div>
    </div>

    <div class="w-full max-w-[370px] relative z-10">
        
        <!-- Profile Section -->
        <div class="text-center mb-10">
            <div class="inline-block relative mb-8">
                <div class="w-20 h-20 rounded-[24px] bg-[#050a14] border border-white/10 flex items-center justify-center p-4 shadow-2xl">
                    <!-- Замени на реальный путь к лого или оставь так -->
                    <img src="https://tersis.lt/wp-content/uploads/2022/02/tersis-logo-white.png" alt="TERSIS" class="w-full h-auto object-contain">
                </div>
            </div>
            
            <h1 class="text-[44px] font-[900] uppercase tracking-tighter leading-none mb-4 italic">
                VADIM <span class="text-[#0052ff]">IVANOV</span>
            </h1>

            <p class="text-[#0052ff] text-[10px] font-black uppercase tracking-[0.2em] mb-4 opacity-90">Logistics & Business Development</p>
            <p class="text-white text-[18px] font-[900] uppercase tracking-[0.3em] leading-none">UAB TERSIS</p>
        </div>

        <!-- УТП Блоки (Более массивные и сбалансированные) -->
        <div class="grid grid-cols-3 gap-3 mb-10">
            <div class="glass-card usp-card rounded-2xl py-5 flex flex-col items-center justify-center">
                <!-- Fleet Icon -->
                <svg class="w-6 h-6 mb-2 text-[#0052ff]" fill="currentColor" viewBox="0 0 24 24"><path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4zM6 18.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm12 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm1-5.5h-2v-4h1.59L19 12.11V13z"/></svg>
                <span class="text-[14px] font-[900] text-white leading-none">27+</span>
                <span class="text-[8px] font-bold text-gray-500 uppercase tracking-widest mt-1">Own Fleet</span>
            </div>
            <div class="glass-card usp-card rounded-2xl py-5 flex flex-col items-center justify-center">
                <!-- Mega Icon -->
                <svg class="w-6 h-6 mb-2 text-[#0052ff]" fill="currentColor" viewBox="0 0 24 24"><path d="M21 16.5C21 16.88 20.79 17.21 20.47 17.38L12.57 21.82C12.41 21.94 12.21 22 12 22C11.79 22 11.59 21.94 11.43 21.82L3.53 17.38C3.21 17.21 3 16.88 3 16.5V7.5C3 7.12 3.21 6.79 3.53 6.62L11.43 2.18C11.59 2.06 11.79 2 12 2C12.21 2 12.41 2.06 12.57 2.18L20.47 6.62C20.79 6.79 21 7.12 21 7.5V16.5Z"/></svg>
                <span class="text-[14px] font-[900] text-white leading-none">105 m³</span>
                <span class="text-[8px] font-bold text-gray-500 uppercase tracking-widest mt-1">Mega Cap</span>
            </div>
            <div class="glass-card usp-card rounded-2xl py-5 flex flex-col items-center justify-center">
                <!-- Direct Icon -->
                <svg class="w-6 h-6 mb-2 text-[#0052ff]" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
                <span class="text-[14px] font-[900] text-white leading-none">DIRECT</span>
                <span class="text-[8px] font-bold text-gray-500 uppercase tracking-widest mt-1">Impact</span>
            </div>
        </div>

        <!-- Кнопка Save Contact -->
        <button onclick="downloadVCard()" class="btn-glow w-full bg-[#0052ff] text-white py-5 rounded-[20px] font-black uppercase tracking-[0.2em] text-sm hover:bg-[#003dd6] transition mb-12 active:scale-95">
            Save Contact
        </button>

        <!-- Business Channels -->
        <div class="space-y-3">
            <p class="text-[10px] font-black text-gray-500 uppercase tracking-[0.5em] text-center mb-6">Business Channels</p>
            
            <a href="https://t.me/bitrabbit" class="glass-card p-5 rounded-[22px] flex items-center group transition-all active:scale-95">
                <div class="w-10 h-10 bg-blue-500/10 rounded-xl flex items-center justify-center mr-5 text-[#0052ff]">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1.01-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.27-.02-.12.02-1.96 1.25-5.54 3.69-.52.36-1 .53-1.42.52-.47-.01-1.37-.26-2.03-.48-.82-.27-1.47-.42-1.42-.88.03-.24.35-.49.96-.75 3.78-1.65 6.31-2.74 7.58-3.27 3.61-1.51 4.35-1.77 4.84-1.78.11 0 .35.03.5.16.12.11.16.26.18.37.01.07.01.21 0 .33z"/></svg>
                </div>
                <span class="font-bold uppercase text-[12px] tracking-[0.2em] flex-1">Telegram</span>
                <svg class="w-4 h-4 text-white/20" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"></path></svg>
            </a>

            <a href="https://wa.me/79266207185" class="glass-card p-5 rounded-[22px] flex items-center group transition-all active:scale-95">
                <div class="w-10 h-10 bg-green-500/10 rounded-xl flex items-center justify-center mr-5 text-green-500">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                </div>
                <span class="font-bold uppercase text-[12px] tracking-[0.2em] flex-1">WhatsApp</span>
                <svg class="w-4 h-4 text-white/20" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"></path></svg>
            </a>

            <a href="https://tersis.lt" class="glass-card p-5 rounded-[22px] flex items-center group transition-all active:scale-95">
                <div class="w-10 h-10 bg-white/5 rounded-xl flex items-center justify-center mr-5 text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                </div>
                <span class="font-bold uppercase text-[12px] tracking-[0.2em] flex-1">Official Website</span>
                <svg class="w-4 h-4 text-white/20" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"></path></svg>
            </a>
        </div>

        <!-- Footer -->
        <div class="mt-16 mb-8 text-center opacity-20">
            <p class="text-[9px] font-black uppercase tracking-[0.6em]">European Asset-Based Carrier</p>
        </div>
    </div>

    <script>
        function downloadVCard() {
            const vCard = `BEGIN:VCARD
VERSION:3.0
FN:Vadim Ivanov
ORG:UAB TERSIS
TITLE:Logistics & Business Development
TEL;TYPE=CELL:+79266207185
EMAIL:business@tersis.lt
URL:https://tersis.lt
END:VCARD`;

            const blob = new Blob([vCard], { type: 'text/vcard' });
            const url = window.URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.setAttribute('download', 'Vadim_Ivanov_TERSIS.vcf');
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
