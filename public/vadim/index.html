<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <title>Vadim Ivanov | UAB TERSIS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #0052ff; --bg: #030712; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: white; margin: 0; padding: 0; min-height: 100vh; }
        
        /* Фон как на основном сайте */
        .bg-layer { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
        .grid-pattern {
            position: absolute; inset: 0;
            background-image: 
                linear-gradient(rgba(0, 82, 255, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 82, 255, 0.08) 1px, transparent 1px);
            background-size: 50px 50px;
            mask-image: radial-gradient(circle at 50% 30%, black 20%, transparent 85%);
            -webkit-mask-image: radial-gradient(circle at 50% 30%, black 20%, transparent 85%);
        }
        .glow {
            position: absolute; top: 0%; left: 50%; transform: translateX(-50%);
            width: 100%; height: 60%;
            background: radial-gradient(circle at 50% 0%, rgba(0, 82, 255, 0.15) 0%, transparent 70%);
        }

        /* Карточки */
        .glass-card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
            transition: all 0.2s ease-out;
        }
        .glass-card:active { transform: scale(0.97); background: rgba(255, 255, 255, 0.06); border-color: var(--accent); }

        .btn-glow { box-shadow: 0 0 25px rgba(0, 82, 255, 0.3); }
        
        /* Убираем выделение при нажатии на мобайле */
        * { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="relative flex flex-col items-center py-12 px-6">
    
    <!-- Background Content -->
    <div class="bg-layer pointer-events-none">
        <div class="grid-pattern"></div>
        <div class="glow"></div>
    </div>

    <div class="w-full max-w-[380px] relative z-10">
        
        <!-- Profile Section -->
        <div class="text-center mb-8">
            <div class="inline-block relative mb-6">
                <!-- Контейнер логотипа -->
                <div class="w-28 h-28 rounded-3xl bg-[#050a14] border border-white/10 flex items-center justify-center p-6 shadow-[0_0_40px_rgba(0,82,255,0.15)]">
                    <img src="/logo.png" alt="TERSIS" class="w-full h-full object-contain transition-transform group-hover:scale-110 duration-300">
                </div>
            </div>
            
            <h1 class="text-4xl font-black uppercase tracking-tight leading-none mb-3">Vadim Ivanov</h1>
            <p class="text-[#0052ff] text-[11px] font-black uppercase tracking-[0.25em]">Logistics & Business Development</p>
            <p class="text-gray-500 text-[10px] font-bold uppercase tracking-[0.45em] mt-2 leading-none">UAB TERSIS</p>
        </div>

        <!-- Кнопка Save Contact -->
        <button onclick="downloadVCard()" class="btn-glow w-full bg-[#0052ff] text-white py-5 rounded-2xl font-black uppercase tracking-[0.15em] text-sm hover:bg-[#003dd6] transition mb-12 active:scale-95">
            Save Contact
        </button>

        <!-- Links List -->
        <div class="space-y-3.5">
            <p class="text-[10px] font-black text-gray-600 uppercase tracking-[0.4em] ml-1 mb-2">Business Channels</p>
            
            <!-- Telegram -->
            <a href="https://t.me/bitrabbit" class="glass-card p-5 rounded-2xl flex items-center group transition-all">
                <div class="w-11 h-11 bg-blue-500/10 rounded-xl flex items-center justify-center mr-5">
                    <svg class="w-5 h-5 text-[#0052ff]" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1.01-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.27-.02-.12.02-1.96 1.25-5.54 3.69-.52.36-1 .53-1.42.52-.47-.01-1.37-.26-2.03-.48-.82-.27-1.47-.42-1.42-.88.03-.24.35-.49.96-.75 3.78-1.65 6.31-2.74 7.58-3.27 3.61-1.51 4.35-1.77 4.84-1.78.11 0 .35.03.5.16.12.11.16.26.18.37.01.07.01.21 0 .33z"/></svg>
                </div>
                <span class="font-bold uppercase text-[11px] tracking-[0.2em] flex-1">Telegram</span>
                <svg class="w-4 h-4 text-white/10" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"></path></svg>
            </a>

            <!-- WhatsApp -->
            <a href="https://wa.me/79266207185" class="glass-card p-5 rounded-2xl flex items-center group transition-all">
                <div class="w-11 h-11 bg-green-500/10 rounded-xl flex items-center justify-center mr-5">
                    <svg class="w-5 h-5 text-green-500" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                </div>
                <span class="font-bold uppercase text-[11px] tracking-[0.2em] flex-1">WhatsApp</span>
                <svg class="w-4 h-4 text-white/10" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"></path></svg>
            </a>

            <!-- Official Website -->
            <a href="https://tersis.lt" class="glass-card p-5 rounded-2xl flex items-center group transition-all">
                <div class="w-11 h-11 bg-white/5 rounded-xl flex items-center justify-center mr-5 italic font-black text-[#0052ff] text-sm">
                    T
                </div>
                <span class="font-bold uppercase text-[11px] tracking-[0.2em] flex-1">Official Website</span>
                <svg class="w-4 h-4 text-white/10" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"></path></svg>
            </a>

            <!-- Call -->
            <a href="tel:+79266207185" class="glass-card p-5 rounded-2xl flex items-center group transition-all">
                <div class="w-11 h-11 bg-white/5 rounded-xl flex items-center justify-center mr-5">
                    <svg class="w-5 h-5 text-gray-300" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                </div>
                <span class="font-bold uppercase text-[11px] tracking-[0.2em] flex-1">Call Vadim</span>
                <svg class="w-4 h-4 text-white/10" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"></path></svg>
            </a>

            <!-- Email -->
            <a href="mailto:business@tersis.lt" class="glass-card p-5 rounded-2xl flex items-center group transition-all">
                <div class="w-11 h-11 bg-white/5 rounded-xl flex items-center justify-center mr-5">
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                </div>
                <span class="font-bold uppercase text-[11px] tracking-[0.2em] flex-1">Email Business</span>
                <svg class="w-4 h-4 text-white/10" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"></path></svg>
            </a>
        </div>

        <!-- Footer -->
        <div class="mt-20 mb-10 text-center opacity-30">
            <p class="text-[8px] font-black uppercase tracking-[0.8em]">
                European Asset-Based Carrier
            </p>
        </div>
    </div>

    <script>
        function downloadVCard() {
            const vCard = `BEGIN:VCARD
VERSION:3.0
FN:Vadim Ivanov
ORG:UAB TERSIS
TITLE:Logistics & Business Development
TEL;TYPE=CELL:+79266207185
EMAIL:business@tersis.lt
URL:https://tersis.lt
END:VCARD`;

            const blob = new Blob([vCard], { type: 'text/vcard' });
            const url = window.URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.setAttribute('download', 'Vadim_Ivanov_TERSIS.vcf');
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
