name: Build Website ZIP
on: [push, workflow_dispatch] # Собирать при каждом пуше или вручную
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build
      - name: Upload Build Folder
        uses: actions/upload-artifact@v4
        with:
          name: website-dist
          path: dist # или build, если папка называется иначе
