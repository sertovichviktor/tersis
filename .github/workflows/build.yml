name: Build Website ZIP
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install and Build
        run: |
          npm install
          npm run build
      - name: Create ZIP
        run: |
          # Теперь всё лежит просто в папке dist
          cd dist
          zip -r ../tersis_spa.zip .
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: tersis-spa-final
          path: tersis_spa.zip
