name: Build Website ZIP
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install and Build
        run: |
          npm install
          npm run build
          
      - name: Generate Static Index
        run: |
          # Заходим в клиентскую часть
          cd dist/client
          
          # Находим актуальные имена файлов (они меняются при каждом билде)
          MANIFEST_JS=$(ls assets/_tanstack-start-manifest*.js | head -n 1)
          ROUTER_JS=$(ls assets/router-*.js | head -n 1)
          ENTRY_JS=$(ls assets/index-*.js | head -n 1)
          START_JS=$(ls assets/start-*.js | head -n 1)
          CSS_FILE=$(ls assets/*.css | head -n 1)
          
          # Создаем index.html, который имитирует серверную среду
          cat <<EOF > index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>TERSIS | European Logistics</title>
            <link rel="stylesheet" crossorigin href="/$CSS_FILE">
            <script type="module">
              // ЭТОТ ХАК ОБМАНЫВАЕТ TANSTACK START
              window.__TSR_DEHYDRATED__ = { data: [] };
            </script>
          </head>
          <body style="background: #030712;">
            <div id="app"></div>
            <div id="root"></div>

            <!-- ГРУЗИМ ВСЕ ЧАСТИ В НУЖНОМ ПОРЯДКЕ -->
            <script type="module" crossorigin src="/$MANIFEST_JS"></script>
            <script type="module" crossorigin src="/$START_JS"></script>
            <script type="module" crossorigin src="/$ROUTER_JS"></script>
            <script type="module" crossorigin src="/$ENTRY_JS"></script>
          </body>
          </html>
          EOF
          
      - name: Create ZIP
        run: |
          cd dist/client
          # Упаковываем только содержимое клиента, сервер нам не нужен
          zip -r ../../tersis_final_fixed.zip .
          
      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: tersis-final-fixed
          path: tersis_final_fixed.zip
